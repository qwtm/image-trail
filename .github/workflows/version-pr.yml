name: Version PR

on:
  push:
    branches:
      - main

concurrency:
  group: version-pr
  cancel-in-progress: false

# Changesets only writes its rolling version branch and pull request. This workflow deliberately
# has no publish command, release creation, tagging, approval, or merge step.
permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Create or update version PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No `publish` input means this action only accumulates changesets into one ready PR.
      # `prDraft` is intentionally omitted: ready-for-review is the action's default.
      - name: Create or update ready version PR
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          title: 'chore: version Image Trail'
          commit: 'chore: version Image Trail'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
